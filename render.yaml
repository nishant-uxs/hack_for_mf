services:
  # MongoDB Database
  - type: pserv
    name: civicsense-db
    env: docker
    plan: free
    repo: https://github.com/render-examples/mongodb.git
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: MONGO_INITDB_ROOT_USERNAME
        value: admin
      - key: MONGO_INITDB_ROOT_PASSWORD
        generateValue: true

  # Full Stack Application - Backend + Frontend
  - type: web
    name: civicsense-app
    env: node
    plan: free
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && npm start
    autoDeploy: true
    healthCheckPath: /api/health
    
    # Serve static files from client build
    staticPublishDir: client/build
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        value: mongodb://admin:${civicsense-db.MONGO_INITDB_ROOT_PASSWORD}@civicsense-db:27017/civicsense?authSource=admin
      - key: CLIENT_URL
        value: https://civicsense-app.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
