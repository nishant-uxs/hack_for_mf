services:
  # MongoDB Database
  - type: pserv
    name: civicsense-mongodb
    env: docker
    plan: free
    repo: https://github.com/render-examples/mongodb.git
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: MONGO_INITDB_ROOT_USERNAME
        value: admin
      - key: MONGO_INITDB_ROOT_PASSWORD
        generateValue: true

  # Backend API Server
  - type: web
    name: civicsense-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        value: mongodb://admin:${civicsense-mongodb.MONGO_INITDB_ROOT_PASSWORD}@civicsense-mongodb:27017/civicsense?authSource=admin
      - key: CLIENT_URL
        value: https://civicsense-frontend.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_SMS_FROM
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

  # Frontend React App
  - type: web
    name: civicsense-frontend
    env: static
    plan: free
    rootDir: client
    buildCommand: npm run build
    publishDir: build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://civicsense-api.onrender.com
