services:
  # Full Stack Application - Backend + Frontend + Database
  - type: web
    name: civicsense-app
    env: node
    plan: free
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && npm start
    autoDeploy: true
    healthCheckPath: /api/health
    
    # Serve static files from client build
    staticPublishDir: client/build
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        value: https://civicsense-app.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
