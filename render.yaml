services:
  # Backend API Server
  - type: web
    name: civicsense-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # Frontend React App
  - type: web
    name: civicsense-frontend
    env: static
    plan: free
    rootDir: client
    buildCommand: npm run build
    publishDir: build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://civicsense-api.onrender.com
